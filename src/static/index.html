<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <div>
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>
        <div class="header-actions">
          <button id="admin-button" type="button">Teacher Login</button>
          <span id="admin-status" class="hidden"></span>
          <button id="logout-button" type="button" class="hidden">Logout</button>
        </div>
      </div>
    </header>

    <section id="admin-container" class="hidden">
      <h3>Teacher Login</h3>
      <form id="admin-form">
        <div class="form-group">
          <label for="admin-username">Username:</label>
          <input type="text" id="admin-username" required placeholder="teacher1" />
        </div>
        <div class="form-group">
          <label for="admin-password">Password:</label>
          <input type="password" id="admin-password" required placeholder="password123" />
        </div>
        <button type="submit">Login</button>
      </form>
    </section>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <p id="admin-note" class="info">Teacher login is required to register or unregister students. Use the button above.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
